<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InstagramProyect · Auth</title>
    <style>
      :root {
        font-family: "Inter", "SF Pro Display", system-ui, sans-serif;
        color: #0f172a;
        background: #f5f5f7;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
        background: radial-gradient(circle at top, #ffffff, #e0e7ff 60%);
      }
      .page {
        width: 100%;
        max-width: 1200px;
        padding: 2rem;
        box-sizing: border-box;
      }
      .auth-wrapper {
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .auth-card {
        background: #ffffff;
        padding: 2.5rem 2rem;
        border-radius: 1.5rem;
        width: min(420px, 90vw);
        box-shadow: 0 25px 60px rgba(15, 23, 42, 0.18);
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .tab-selector {
        display: flex;
        border-radius: 999px;
        background: #f8fafc;
        padding: 4px;
        gap: 0.5rem;
        margin-bottom: 0;
      }
      .tab-selector button {
        flex: 1;
        border: none;
        background: transparent;
        padding: 0.5rem 0;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
        color: #94a3b8;
        transition: all 0.2s ease;
      }
      .tab-selector button.active {
        color: #0f172a;
        background: white;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
      }
      .form-pane {
        display: none;
        flex-direction: column;
        gap: 0.5rem;
      }
      .form-pane.active {
        display: flex;
      }
      label {
        font-size: 0.85rem;
        color: #94a3b8;
        display: block;
        margin-bottom: 0.25rem;
      }
      input {
        width: calc(100% - 32px);
        padding: 0.85rem 1rem;
        border-radius: 0.85rem;
        border: 1px solid #e2e8f0;
        margin-bottom: 1rem;
        font-size: 1rem;
        background: #f8fafc;
      }
      button.primary {
        width: 140px;
        padding: 0.85rem 0;
        border-radius: 0.85rem;
        border: none;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease;
        align-self: center;
      }
      button.primary:hover {
        transform: translateY(-1px);
      }
      .feedback {
        margin: 0;
        font-size: 0.85rem;
        color: #475569;
        text-align: center;
        min-height: 1.5rem;
        margin-top: 0.5rem;
      }
      .dashboard {
        display: none;
        width: 100%;
        max-width: 960px;
        margin: 0 auto;
      }
      .dashboard.active {
        display: block;
      }
      .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
      }
      .logout-btn {
        border: none;
        background: #fee2e2;
        color: #b91c1c;
        padding: 0.5rem 1rem;
        border-radius: 0.75rem;
        font-weight: 600;
        cursor: pointer;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }
      .metric-card {
        background: white;
        border-radius: 1rem;
        padding: 1rem;
        box-shadow: 0 15px 35px rgba(15, 23, 42, 0.1);
        min-height: 120px;
      }
      .code-modal {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.45);
        padding: 1rem;
        z-index: 10;
      }
      .code-modal.hidden {
        display: none;
      }
      .code-modal__card {
        background: white;
        border-radius: 1rem;
        padding: 1.5rem;
        width: min(360px, 90vw);
        box-shadow: 0 35px 65px rgba(15, 23, 42, 0.25);
        text-align: center;
      }
      .code-modal__card button {
        margin-top: 1rem;
      }
      .code-modal__card .status {
        background: #eef2ff;
        border-radius: 0.65rem;
        padding: 0.5rem 0.65rem;
        color: #312e81;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }
      .code-modal__close {
        margin-top: 0.5rem;
        background: #f1f5f9;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <div class="page" id="auth-page">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="tab-selector">
            <button data-tab="login" class="active">Login</button>
            <button data-tab="register">Register</button>
          </div>
          <div id="login-pane" class="form-pane active">
            <label>Correo</label>
            <input type="email" name="login-username" value="client@example.com" required />
            <label>Contraseña</label>
            <input type="password" name="login-password" value="secret" required />
            <button class="primary" id="login-btn">Submit</button>
          </div>
          <div id="register-pane" class="form-pane">
            <label>Correo</label>
            <input type="email" name="register-username" placeholder="nuevo@instagramproyect.com" required />
            <label>Contraseña</label>
            <input type="password" name="register-password" placeholder="Contraseña segura" required />
            <label>Confirmar contraseña</label>
            <input type="password" name="register-confirm" placeholder="Repite la contraseña" required />
            <button class="primary" id="register-btn">Submit</button>
          </div>
          <p class="feedback" id="status"></p>
        </div>
      </div>
    </div>
    <div class="page dashboard" id="dashboard-page">
      <div class="dashboard-header">
        <div>
          <h1>Dashboard</h1>
          <p id="dashboard-subtitle">Resumen rápido de InstagramProyect.</p>
        </div>
        <button class="logout-btn" id="dashboard-logout">Cerrar sesión</button>
      </div>
      <div class="metrics">
        <div class="metric-card">
          <h3>Campañas activas</h3>
          <p>8 activos sincronizados.</p>
        </div>
        <div class="metric-card">
          <h3>Alertas</h3>
          <p>1 alarma crítica (métricas fuera de rango).</p>
        </div>
        <div class="metric-card">
          <h3>Códigos pendientes</h3>
          <p>Generamos códigos automáticos tras cada inicio de sesión.</p>
        </div>
      </div>
    </div>
    <div class="code-modal hidden" id="code-modal">
      <div class="code-modal__card">
        <p id="modal-message">Se te ha enviado un código a tu correo.</p>
        <input type="text" id="modal-code" maxlength="6" placeholder="Introduce el código" />
        <p class="status" id="modal-preview"></p>
        <button class="primary" id="modal-confirm">Confirmar código</button>
        <button class="code-modal__close" id="modal-close">Cancelar</button>
      </div>
    </div>
    <script>
      window.APP_CONFIG = {
        apiBase:
          window.location.hostname === "localhost" ? "http://localhost:8000" : "http://backend:8000",
      };
    </script>
    <script src="./main.js"></script>
  </body>
</html>
